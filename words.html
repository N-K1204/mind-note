<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>きもちボード - ことばのレッスン</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --wood-dark: #79553D;
            --wood-light: #DEB887;
            --paper: #FFFdf5;
            --primary: #ff8bb0;
            --blue: #7da6ff;
            --curtain: #c0392b;
        }

        /* --- 紙芝居の舞台デザイン --- */
        .kamishibai-stage {
            background: var(--wood-light);
            border: 12px solid var(--wood-dark);
            border-radius: 20px;
            width: 100%; aspect-ratio: 4/3;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 15px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            margin-bottom: 20px; margin-top: 10px;
            box-sizing: border-box;
        }

        /* 🎭 幕（カーテン） */
        .curtain {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: var(--curtain); z-index: 50;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 4px solid rgba(0,0,0,0.2);
        }
        .curtain.left { left: 0; transform-origin: left; }
        .curtain.right { right: 0; transform-origin: right; border-right: none; border-left: 4px solid rgba(0,0,0,0.2); }
        .curtain-open .curtain.left { transform: translateX(-100%); }
        .curtain-open .curtain.right { transform: translateX(100%); }

        /* 💖 なかよしゲージ */
        .nakayoshi-meter {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.9); padding: 5px 10px;
            border-radius: 15px; border: 3px solid var(--wood-dark);
            font-size: 16px; font-weight: bold; color: var(--wood-dark);
            z-index: 40; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 絵のエリア */
        .picture-area {
            flex: 1; background: var(--paper);
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; position: relative;
            border-bottom: 4px solid var(--wood-dark);
            transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out;
            cursor: pointer;
        }
        .tap-hint { animation: pulseHint 1.5s infinite; }
        @keyframes pulseHint { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        /* 💭 こころの声フキダシ */
        .thought-bubble {
            position: absolute; top: 8%; left: 50%; transform: translateX(-50%) scale(0);
            background: white; border: 4px solid var(--blue); border-radius: 20px;
            padding: 8px 14px; font-size: 16px; font-weight: bold; color: #333;
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; white-space: nowrap;
        }
        .thought-bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            border-width: 12px 12px 0; border-style: solid;
            border-color: var(--blue) transparent transparent transparent;
        }
        .show-thought { transform: translateX(-50%) scale(1); opacity: 1; }

        /* テキストエリア */
        .text-area {
            height: 35%; background: white;
            padding: 12px; font-size: 17px; font-weight: 700;
            line-height: 1.4; display: flex; align-items: center; justify-content: center;
            text-align: center; color: #333; box-sizing: border-box;
        }

        /* やりなおし・クリア画面 */
        .feedback-overlay {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .feedback-overlay h2 { font-size: 24px; margin: 0 0 10px 0; font-weight: 900; }
        .feedback-overlay p { font-weight: bold; line-height: 1.5; color: #555; margin: 0 0 20px 0; }

        /* 特大えらぶボタン */
        .words-controls { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn-choice-style { background: #fff; border: 4px solid var(--blue) !important; color: var(--blue) !important; box-shadow: 0 6px 0 var(--blue) !important; }
        .btn-choice-style.btn-bad-style { border-color: #ff5252 !important; color: #ff5252 !important; box-shadow: 0 6px 0 #ff5252 !important; }

        /* スクロール対応のおはなしリスト */
        .book-list {
            width: 100%; display: flex; flex-direction: column; gap: 10px;
            max-height: 50vh; overflow-y: auto; padding: 10px;
            border: 2px dashed #79553D; border-radius: 20px; background: rgba(255,255,255,0.6);
            box-sizing: border-box;
        }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
        .confetti-piece { position: absolute; font-size: 30px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>

            bad1: { reason: "怒っていても「きらい」「あっちいけ」は相手の心を深く傷つけるよ。素直にあやまろう。" },
            4: { pic: "👦🙇‍♂️", text: "「本当はきらいじゃないよ。ひどいこと言ってごめんね」と素直になれました。", thought: "怒ってごめんね", next: 5 },
            5: { pic: "🐱✨", text: "「わたしもごめんね。また仲良くしよう！」と仲直りできました。", thought: "よかった、嫌われてなかった", next: "clear" }
        },

        lesson9: {
            1: { pic: "🐶💦", text: "いぬくんが派手にドテッ！と転んでしまいました。", thought: "いたたたた…", next: 2 },
            2: { pic: "👦😂", text: "転び方がおもしろくて、つい「あははは！」と大声で笑ってしまいました。", thought: "おもしろいころびかた！", next: 3 },
            3: { pic: "🐶😭", text: "いぬくんは泣いてしまいました。どうする？", thought: "痛いのに笑わないでよ…",
                choices: [
                    { text: "👉 「だって本当におかしかったんだもん」と言う", next: "bad1", type: "bad" },
                    { text: "👉 「笑ってごめんね。だいじょうぶ？」ときく", next: 4, type: "good" }
                ]
            },
            bad1: { reason: "自分が痛くて悲しいときに笑われたら嫌だよね。相手の立場になって気持ちを考えよう。" },
            4: { pic: "👦🤝", text: "「笑っちゃって悪かったよ。痛かったよね、大丈夫？」と声をかけてあげました。", thought: "心配してくれてありがとう", next: 5 },
            5: { pic: "🐶✨", text: "「びっくりしたけど大丈夫だよ、ありがとう！」と笑顔に戻りました。", thought: "たすけてくれてうれしいな", next: "clear" }
        },

        lesson10: {
            1: { pic: "👦🧢", text: "いたずら半分で、こっそりうさぎちゃんの帽子を隠してしまいました。", thought: "いたずらしちゃおっと", next: 2 },
            2: { pic: "🐰🔍", text: "うさぎちゃんは帽子がなくて、困って必死に探しています。", thought: "どこにいっちゃったの？", next: 3 },
            3: { pic: "🐰😭", text: "うさぎちゃんが泣き出してしまいました。どうする？", thought: "お気に入りの帽子なのに…",
                choices: [
                    { text: "👉 帽子をだして「隠してごめんね」と言う", next: 4, type: "good" },
                    { text: "🤫 バレるのが怖いからしらないふりをする", next: "bad1", type: "bad" }
                ]
            },
            bad1: { reason: "冗談のつもりでも、相手が泣くほど困っていたらやりすぎ！すぐに返してあやまろう。" },
            4: { pic: "👦🙇‍♂️", text: "「意地悪してごめんなさい、ここに隠してたの」と帽子を返せました。", thought: "帽子あった！よかった！", next: 5 },
            5: { pic: "🐰😊", text: "「見つかってよかった。もう隠さないでね！」と許してくれました。", thought: "ちゃんと返してくれてありがとう", next: "clear" }
        }
    };

    let currentLessonData = null;
    let currentLessonId = "";
    let currentPageId = 1;
    let heartCount = 2;

    function updateMeter() {
        let hearts = "きずな：";
        for(let i=0; i<3; i++) hearts += (i < heartCount) ? "💛" : "🖤";
        document.getElementById('meter').innerText = hearts;
    }

    function startWordsLesson(lessonId) {
        currentLessonId = lessonId;
        currentLessonData = LESSONS[lessonId];
        currentPageId = 1;
        heartCount = 2; 
        
        document.getElementById('words-menu-screen').classList.remove('active');
        document.getElementById('words-play-screen').classList.add('active');
        document.getElementById('bad-end-overlay').style.display = "none";
        document.getElementById('happy-end-overlay').style.display = "none";
        
        const stage = document.getElementById('stage');
        stage.classList.remove('curtain-open');
        updateMeter();

        setTimeout(() => {
            stage.classList.add('curtain-open');
            renderPage();
        }, 500);
    }

    function renderPage() {
        const page = currentLessonData[currentPageId];
        
        document.getElementById('thought').classList.remove('show-thought');
        if(page.thought) document.getElementById('thought').innerText = page.thought;

        const picArea = document.getElementById('picture-area');
        picArea.style.opacity = 0;
        picArea.style.transform = "translateX(20px)";
        
        setTimeout(() => {
            document.getElementById('pic-emoji').innerText = page.pic;
            document.getElementById('text-area').innerText = page.text;
            picArea.style.opacity = 1;
            picArea.style.transform = "translateX(0)";
        }, 200);

        const controls = document.getElementById('controls');
        controls.innerHTML = "";

        if (page.choices) {
            picArea.classList.add('tap-hint');
            page.choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = c.type === "good" ? "nintendo-action-btn next-action btn-choice-style" : "nintendo-action-btn reset-action btn-choice-style btn-bad-style";
                btn.innerText = c.text;
                btn.onclick = () => {
                    if(c.type === "good") { heartCount = 3; updateMeter(); }
                    else { heartCount = 1; updateMeter(); }
                    goToNext(c.next);
                };
                controls.appendChild(btn);
            });
        } else {
            picArea.classList.remove('tap-hint');
            const btn = document.createElement('button');
            btn.className = "nintendo-action-btn next-action";
            btn.innerText = "つぎへ すすむ ➡️";
            btn.onclick = () => goToNext(page.next);
            controls.appendChild(btn);
        }
    }

    function showThought() {
        const thought = document.getElementById('thought');
        thought.classList.add('show-thought');
        setTimeout(() => { thought.classList.remove('show-thought'); }, 2500);
    }

    function goToNext(nextId) {
        if (nextId === "clear") {
            showClear();
        } else if (String(nextId).startsWith("bad")) {
            showBadEnd(currentLessonData[nextId].reason);
        } else {
            currentPageId = nextId;
            renderPage();
        }
    }

    function showBadEnd(reasonText) {
        document.getElementById('bad-reason').innerText = reasonText;
        document.getElementById('bad-end-overlay').style.display = "flex";
        document.getElementById('controls').innerHTML = "";
    }

    function restartLesson() {
        document.getElementById('bad-end-overlay').style.display = "none";
        heartCount = 2; updateMeter();
        currentPageId = 1;
        renderPage();
    }

    function showClear() {
        document.getElementById('happy-end-overlay').style.display = "flex";
        document.getElementById('controls').innerHTML = "";
        
        var currentCoins = parseInt(localStorage.getItem('game_coins') || 0);
        localStorage.setItem('game_coins', currentCoins + 15);
        
        localStorage.setItem('words_clear_' + currentLessonId, 'true');
        fireConfetti();
    }

    function backToWordsMenu() {
        document.getElementById('confetti').style.display = "none";
        document.getElementById('confetti').innerHTML = "";
        document.getElementById('words-play-screen').classList.remove('active');
        document.getElementById('words-menu-screen').classList.add('active');
        updateWordsBadges();
    }

    function updateWordsBadges() {
        for (let i = 1; i <= 10; i++) {
            var isCleared = localStorage.getItem('words_clear_lesson' + i);
            var badge = document.getElementById('words-badge-lesson' + i);
            if (badge) {
                if (isCleared === 'true') {
                    badge.innerText = "👑 クリア！";
                    badge.style.color = "#ffa502";
                } else {
                    badge.innerText = "🌟 みくりあ";
                    badge.style.color = "#718093";
                }
            }
        }
    }

    function fireConfetti() {
        const container = document.getElementById('confetti');
        container.style.display = "block";
        const emojis = ["🎉", "✨", "🌸", "🌟", "💖"];
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti-piece';
            conf.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = -50 + 'px';
            conf.style.fontSize = (Math.random() * 20 + 20) + 'px';
            conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
            conf.style.animationDelay = (Math.random() * 0.5) + 's';
            container.appendChild(conf);
        }
    }

    updateWordsBadges();
</script>
</body>
</html>
