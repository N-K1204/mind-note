<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココロノクエスト - ミニマルエディション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ゲームコンテナ">
        <div class="画面フラッシュ" id="flash-effect"></div>

        <div id="タイトル画面" class="シーン アクティブ">
            <h1 class="メインタイトル">ココロノクエスト</h1>
            <p class="スタート案内" onclick="ゲーム開始()">選択を始める →</p>
        </div>

        <div id="プレイ画面" class="シーン">
            
            <header class="ステータスエリア">
                <div class="状態テキスト">
                    <span id="current-chapter">第1章：静かなる目覚め</span>
                    <span id="player-status" class="ステータス通常">通常状態</span>
                </div>
                <div class="ゲージ本体">
                    <div id="mental-bar" class="ゲージ中身" style="width: 100%;"></div>
                </div>
            </header>

            <div class="メインコンテンツ">
                
                <main class="カードエリア">
                    <div id="昼のカード" class="カードグリッド アクティブ">
                        <div class="カード" onclick="選択イベント(this, 'image0', 'いつも通りの朝', '清々しい光が差し込む。今日も無事に一日が始まった。', 0, '平穏')">
                            <img src="image0.png" alt="朝">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image1', '動き出す街', '人々が行き交う中を進む。周囲との調和を感じている。', 0, '調和')">
                            <img src="image1.png" alt="昼">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image2', '小さな違和感', 'ざわつきを覚える。ココロの防壁にわずかなノイズ。', 10, '警戒')">
                            <img src="image2.png" alt="夕">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image3', '分岐点', '進むべき道を選択する時。あなたの直感が試される。', 15, '決断')">
                            <img src="image3.png" alt="道">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image4', '夕暮れの影', '薄暗い影が伸びる。孤独感が静かに押し寄せてきた。', 20, '孤独')">
                            <img src="image4.png" alt="影">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image5', '夜の帳', '深い闇が世界を包む。不調の足音が近づいている。', 25, '黄昏')">
                            <img src="image5.png" alt="夜">
                        </div>
                    </div>

                    <div id="夜のカード" class="カードグリッド">
                        <div class="カード" onclick="選択イベント(this, 'image6', '状態：トイレにいきたい', '限界突破寸前の生理欲求。一刻の猶予もない！', 20, '焦燥')">
                            <img src="image6.png" alt="トイレ">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image7', '状態：おなかいたい', '内臓への痛撃を検知。行動力が削がれていく。', 40, '苦痛')">
                            <img src="image7.png" alt="腹痛">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image8', '状態：あたまいたい', '頭部への過負荷。思考回路が強制冷却を求めている。', 30, '混乱')">
                            <img src="image8.png" alt="頭痛">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image9', '状態：おなかすいた', '内部燃料が完全にゼロ。補給を最優先せよ。', 15, '飢餓')">
                            <img src="image9.png" alt="空腹">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image10', '状態：ねれない', '覚醒状態が固定。ココロの休息フェーズに移行不能。', 35, '不眠')">
                            <img src="image10.png" alt="不眠">
                        </div>
                        <div class="カード" onclick="選択イベント(this, 'image11', '状態：おしごといやだ', '全てのタスクへの拒絶。ココロが完全ボイコットを選択。', 60, '限界')">
                            <img src="image11.png" alt="拒否">
                        </div>
                    </div>
                </main>

                <aside class="ログエリア">
                    <div id="log-content" class="ログ中身">
                        <div class="ログ行システム">システム起動。</div>
                    </div>
                </aside>
            </div>

            <footer class="メッセージエリア">
                <h2 id="msg-title" class="メッセージタイトル">行動を選択してください</h2>
                <p id="msg-desc" class="メッセージ詳細">選んだ状態によって、物語が進行し、属性が変化します。</p>
            </footer>
        </div>

        <div id="結果画面" class="シーン">
            <h1 id="result-title" class="結果タイトル">結果確認中</h1>
            <p id="result-desc" class="結果詳細">ここに結末が表示されます。</p>
            <div class="リトライボタン" onclick="ゲームリセット()">最初からやり直す</div>
        </div>

    </div>

    <script>
        let 精神耐久値 = 100;
        let 現在のルート = 'day';
        let 現在の章 = 1;

        const 章の名前 = {
            1: "第1章：静かなる目覚め",
            2: "第2章：日常の歯車",
            3: "第3章：忍び寄る不穏",
            4: "第4章：運命の分岐点",
            5: "第5章：深層の葛藤",
            6: "最終章：ココロの結末"
        };

        function ゲーム開始() {
            document.getElementById('タイトル画面').classList.remove('active');
            document.getElementById('プレイ画面').classList.add('active');
            フラッシュ演出();
            ログ追加("システム", "第1章 開始。");
        }

        function 選択イベント(要素, 画像名, タイトル, 説明, ダメージ, 感情属性) {
            if (現在の章 > 6) return;

            document.querySelectorAll('.カード').forEach(c => c.classList.remove('selected'));
            要素.classList.add('selected');

            document.getElementById('msg-title').innerText = タイトル;
            document.getElementById('msg-desc').innerText = 説明;

            精神耐久値 -= ダメージ;
            if (精神耐久値 < 0) 精神耐久値 = 0;
            
            const ゲージ中身 = document.getElementById('mental-bar');
            ゲージ中身.style.width = 精神耐久値 + '%';

            if (ダメージ > 0) {
                フラッシュ演出();
                ログ追加("ダメージ", `負荷：-${ダメージ}`);
            }

            ログ追加("選択", `${タイトル} （${感情属性}）`);
            更新プレイヤー属性(感情属性);

            現在の章++;
            if (現在の章 <= 6) {
                setTimeout(() => {
                    document.getElementById('current-chapter').innerText = 章の名前[現在の章];
                    ログ追加("システム", `${章の名前[現在の章]}`);
                    
                    if (現在のルート === 'day' && (精神耐久値 <= 50 || 感情属性 === '孤独' || 感情属性 === '黄昏')) {
                        現在のルート = 'night';
                        フラッシュ演出();
                        document.getElementById('昼のカード').classList.remove('active');
                        document.getElementById('夜のカード').classList.add('active');
                        ログ追加("警告", "不調ルートへ移行。");
                    }
                }, 600);
            } else {
                setTimeout(() => {
                    判定エンディング();
                }, 1000);
            }
        }

        function 更新プレイヤー属性(最新感情) {
            const ステータス表示 = document.getElementById('player-status');
            
            if (精神耐久値 <= 20) {
                ステータス表示.innerText = "満身創痍";
            } else if (最新感情 === '限界' || 最新感情 === '苦痛') {
                ステータス表示.innerText = "精神混濁";
            } else if (精神耐久値 >= 80) {
                ステータス表示.innerText = "平穏無事";
            } else {
                ステータス表示.innerText = "繊細モード";
            }
        }

        function ログ追加(種別, テキスト) {
            const ログ中身 = document.getElementById('log-content');
            const 新ログ = document.createElement('div');
            新ログ.className = "ログ行";
            新ログ.innerText = `・ ${テキスト}`;
            ログ中身.appendChild(新ログ);
            ログ中身.scrollTop = ログ中身.scrollHeight;
        }

        function フラッシュ演出() {
            const エフェクト = document.getElementById('flash-effect');
            エフェクト.style.opacity = '0.3';
            setTimeout(() => {
                エフェクト.style.opacity = '0';
            }, 100);
        }

        function 判定エンディング() {
            document.getElementById('プレイ画面').classList.remove('active');
            document.getElementById('結果画面').classList.add('active');

            const タイトル枠 = document.getElementById('result-title');
            const 詳細枠 = document.getElementById('result-desc');

            if (精神耐久値 <= 0) {
                タイトル枠.innerText = "完全停止";
                詳細枠.innerText = "ココロの耐久値が底を突きました。これ以上の前進は不可能です。今日のミッションは完全撤退を余儀なくされました。";
            } else if (現在のルート === 'night' && 精神耐久値 < 40) {
                タイトル枠.innerText = "不調サバイバル";
                詳細枠.innerText = "数々の頭痛や腹痛に耐え抜き、なんとか一日を生き延びました。満身創痍のクリアです。";
            } else if (現在のルート === 'day' && 精神耐久値 >= 80) {
                タイトル枠.innerText = "完全なる調和";
                詳細枠.innerText = "おめでとうございます！すべてのノイズを制御し、高い精神耐久値を維持したまま一日を完了しました。";
            } else {
                タイトル枠.innerText = "普通の軌跡";
                詳細枠.innerText = "多少の波風や疲れはありましたが、ごく平均的で穏やかな一日として物語は収束しました。";
            }
        }

        function ゲームリセット() {
            精神耐久値 = 100;
            現在のルート = 'day';
            現在の章 = 1;
            
            document.getElementById('mental-bar').style.width = '100%';
            document.getElementById('current-chapter').innerText = 章の名前[1];
            document.getElementById('player-status').innerText = "通常状態";
            
            document.getElementById('昼のカード').classList.add('active');
            document.getElementById('夜のカード').classList.remove('active');
            
            document.getElementById('msg-title').innerText = '行動を選択してください';
            document.getElementById('msg-desc').innerText = '選んだ状態によって、物語が進行し、属性が変化します。';
            document.getElementById('log-content').innerHTML = '<div class="ログ行システム">システム再起動。</div>';

            document.getElementById('結果画面').classList.remove('active');
            document.getElementById('タイトル画面').classList.add('active');
        }
    </script>

</body>
</html>
