<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きもちボード - ホーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-bg">

    <div class="game-container">
        
        <!-- ポップな12時間時計 -->
        <div class="nintendo-clock">
            <span id="clock-period" class="badge-period">ごぜん</span>
            <span id="digital-clock" class="text-clock">00:00:00</span>
        </div>

        <!-- プレイヤーのステータス -->
        <div class="player-status-bar">
            <div class="status-item"><span class="status-icon">⭐</span> レベル: <span id="player-level">1</span></div>
            <div class="status-item"><span class="status-icon">🪙</span> コイン: <span id="player-coins">0</span></div>
            <div class="status-item"><span class="status-icon">🛡️</span> そうび: <span id="player-equipped">なし</span></div>
        </div>

        <header class="game-header">
            <h1 class="game-title">きもちボード</h1>
            <p class="game-subtitle">どこに ぼうけんに いこうかな？</p>
        </header>

        <!-- メニューセレクト -->
        <main class="nintendo-menu">
            <a href="game.html" class="nintendo-btn btn-yellow">
                <span class="btn-icon">🎮</span>
                <span class="btn-content">
                    <span class="btn-title">アクションゲーム</span>
                    <span class="btn-subtext">全6ステージ！えらんで ぼうけんだ！</span>
                </span>
            </a>

            <a href="board.html" class="nintendo-btn btn-red">
                <span class="btn-icon">💬</span>
                <span class="btn-content">
                    <span class="btn-title">きもちボード</span>
                    <span class="btn-subtext">いまの きもちを カードでおくるよ！</span>
                </span>
            </a>

            <a href="training.html" class="nintendo-btn btn-blue">
                <span class="btn-icon">🧠</span>
                <span class="btn-content">
                    <span class="btn-title">クイズトレーニング</span>
                    <span class="btn-subtext">全6話のおはなしを クリアしよう！</span>
                </span>
            </a>

            <!-- 【NEW】言葉のレッスンモード -->
            <a href="words.html" class="nintendo-btn btn-orange">
                <span class="btn-icon">📢</span>
                <span class="btn-content">
                    <span class="btn-title">言葉のレッスン</span>
                    <span class="btn-subtext">ちくちく言葉と ふわふわ言葉のべんきょう</span>
                </span>
            </a>

            <a href="line.html" class="nintendo-btn btn-purple">
                <span class="btn-icon">✏️</span>
                <span class="btn-content">
                    <span class="btn-title">点つなぎパズル</span>
                    <span class="btn-subtext">おなじ色の 点と点を 線でむすぼう！</span>
                </span>
            </a>

            <a href="shop.html" class="nintendo-btn btn-green">
                <span class="btn-icon">🛍️</span>
                <span class="btn-content">
                    <span class="btn-title">コインショップ</span>
                    <span class="btn-subtext">あつめた コインで おかいもの！</span>
                </span>
            </a>
        </main>

    </div>

    <script>
        function loadStatus() {
            var coins = localStorage.getItem('game_coins') || 0;
            var level = localStorage.getItem('game_level') || 1;
            var eq = localStorage.getItem('game_equipped') || "none";
            
            var eqName = "なし";
            if(eq === "crown") eqName = "お祝いクラウン (コイン2倍)";
            if(eq === "leaf") eqName = "木の葉 (ジャンプ強化)";
            if(eq === "ramen") eqName = "ラーメン (スピード高速)";

            document.getElementById('player-coins').innerText = coins;
            document.getElementById('player-level').innerText = level;
            document.getElementById('player-equipped').innerText = eqName;
        }

        function updateClock() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            
            var period = "ごぜん";
            if (hours >= 12) { period = "ごご"; }
            if (hours > 12) { hours = hours - 12; } 
            else if (hours === 0) { hours = 12; }
            
            hours = ("0" + hours).slice(-2);
            minutes = ("0" + minutes).slice(-2);
            seconds = ("0" + seconds).slice(-2);
            
            document.getElementById('digital-clock').innerText = hours + ":" + minutes + ":" + seconds;
            document.getElementById('clock-period').innerText = period;
        }
        
        setInterval(updateClock, 1000);
        updateClock(); 
        loadStatus();
    </script>
</body>
</html>
